<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquejada Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1><span><i class="bi bi-trophy Title"></i> Vaquejada Pro</span></h1>
        <div class="menu">
            <a href="index.html" class="menu-item"><span><i class="bi bi-house incio"></i> Início</span></a>
            <a href="ranking.html" class="menu-item"><span><i class="bi bi-trophy subtitle"></i> Ranking</span></a>
            <a href="eventos.html" class="menu-item"><span><i class="bi bi-calendar"></i> Eventos</span></a>
            <a href="inscricao.html" class="menu-item"><span><i class="bi bi-person-plus"></i> Inscrição</span></a>
            <a href="login.html" class="menu-item-login"><span><i class="bi bi-arrow-right"></i> Entrar</span></a>
        </div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <i class="bi bi-box-arrow-in-right icone-login"></i>
            <h2>Entrar</h2>
            <p>Acesse o painel administrativo</p>
            <button class="btn-google">
                <i class="bi bi-google"></i> Entrar com Google
            </button>
            <div class="ou">OU</div>
            <form>
                <label>Email</label>
                <input type="email" placeholder="seu@email.com">
                <label>Senha</label>
                <input type="password" placeholder="********">
                <a href="#" class="esqueci">Esqueci minha senha</a>
                <button type="submit" class="btn-entrar">
                    Entrar
                </button>
            </form>
            <p class="cadastro">
                Não tem conta? <a href="#" class="conta">Criar conta</a>
            </p>

        </div>
    </div>

</body>
</html>
