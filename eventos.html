<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>Eventos - Vaquejada Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar-container">
        <h1><a href="index.html" class="navbar-brand"><span><i class="bi bi-trophy Title"></i> Vaquejada Pro</span></a></h1>
        <div class="navbar-actions">
            <button class="tema-btn" id="tema-btn" type="button" aria-label="Alternar tema"><i class="bi bi-moon-stars"></i></button>
            <button class="hamburger" id="hamburger-btn" type="button" aria-label="Abrir menu"><i class="bi bi-list"></i></button>
        </div>
        <div class="menu" id="nav-menu">
            <a href="index.html" class="menu-item" data-page="index"><span><i class="bi bi-house"></i> Início</span></a>
            <a href="ranking.html" class="menu-item" data-page="ranking"><span><i class="bi bi-trophy"></i> Ranking</span></a>
            <a href="eventos.html" class="menu-item" data-page="eventos"><span><i class="bi bi-calendar"></i> Eventos</span></a>
            <a href="noticias.html" class="menu-item" data-page="noticias"><span><i class="bi bi-newspaper"></i> Notícias</span></a>
            <a href="inscricao.html" class="menu-item" data-page="inscricao"><span><i class="bi bi-person-plus"></i> Inscrição</span></a>
            <a href="login.html" class="menu-item" id="menu-login" data-page="login"><span><i class="bi bi-box-arrow-in-right"></i> Entrar</span></a>
        </div>
    </nav>

    <div class="Title-evento">
        <h2><i class="bi bi-trophy"></i> Calendário de Eventos</h2>
        <div class="busca-evento">
            <label for="pesquisa-evento">Buscar Evento</label>
            <input type="text" id="pesquisa-evento" placeholder="Digite o nome do evento">
        </div>
    </div>

    <div class="eventos-container">
        <div class="eventos-cards" id="lista-eventos"></div>
    </div>

    <div class="modal fade" id="modalEvento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="conteudo-modal"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/security.js"></script>
    <script src="js/cookie.js"></script>
    <script src="js/session.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/eventos.js"></script>
</body>
</html>
