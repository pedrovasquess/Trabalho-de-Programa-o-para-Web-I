<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquejada Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="navbar-container">
        <h1><span><i class="bi bi-trophy Title"></i> Vaquejada Pro</span></h1>
        <div class="menu">
            <a href="index.html" class="menu-item"><span><i class="bi bi-house incio"></i> Início</span></a>
            <a href="ranking.html" class="menu-item"><span><i class="bi bi-trophy subtitle"></i> Ranking</span></a>
            <a href="eventos.html" class="menu-item-eventos"><span><i class="bi bi-calendar"></i> Eventos</span></a>
            <a href="inscricao.html" class="menu-item"><span><i class="bi bi-person-plus"></i> Inscrição</span></a>
            <a href="login.html" class="menu-item"><span><i class="bi bi-arrow-right"></i> Entrar</span></a>
        </div>
    </div>

    <div class="Title-evento">
        <h2><i class="bi bi-trophy"></i> Calendário de Eventos</h2>
        <div class="busca-evento">
            <label>Buscar Evento</label>
           <input 
                type="text" 
                id="pesquisa-evento"
                placeholder="Digite o nome do evento"
            >
        </div>
    </div>

    <div class="eventos-container">
        <div class="eventos-cards" id="lista-eventos"></div>
    </div>

    <div class="modal fade" id="modalEvento" tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        Detalhes do Evento
                    </h5>
                    <button 
                        type="button" 
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>
                </div>
                <div class="modal-body" id="conteudo-modal">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dados.js"></script>
    <script src="js/eventos.js"></script>
</body>
</html>
